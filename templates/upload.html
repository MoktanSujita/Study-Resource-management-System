<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Study Materials</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<!-- Top Navbar -->
<div class="navbar-custom">
  Upload Study Materials
</div>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-sm-11">

      <div class="card upload-card p-4">
        <h4 class="text-center mb-4 fw-bold">📤 Upload New Material</h4>

        <form action="../php/uploads.php" method="POST" enctype="multipart/form-data">

          <!-- Title -->
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" placeholder="Enter material title" required>
          </div>

          <!-- Semester -->
          <div class="mb-3">
            <label class="form-label">Select Semester</label>
            <select name="semester" class="form-select" required>
              <option value="">Choose Semester</option>
              <option>Semester 1</option>
              <option>Semester 2</option>
              <option>Semester 3</option>
              <option>Semester 4</option>
              <option>Semester 5</option>
              <option>Semester 6</option>
              <option>Semester 7</option>
              <option>Semester 8</option>
            </select>
          </div>

          <!-- Subject -->
          <div class="mb-3">
            <label class="form-label">Subject Name</label>
            <input type="text" name="subject" class="form-control" placeholder="e.g. Data Structures and Algorithms" required>
          </div>

          <!-- File -->
          <div class="mb-4">
            <label class="form-label">Upload File</label>
            <input type="file" name="file" class="form-control" required>
          </div>

          <!-- Button -->
          <button type="submit" class="btn btn-primary w-100">
            Upload Material
          </button>

        </form>
      </div>

    </div>
  </div>
</div>

</body>
</html>
